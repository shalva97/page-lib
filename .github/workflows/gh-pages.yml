name: Publish Library to GitHub Pages 

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and Publish Library
        run: ./gradlew build publishToMavenLocal

      - name: Build Maven Repository Layout
        run: |
          mkdir -p repo/releases
          for file in build/publications/mavenJava/maven-jar-1.0-SNAPSHOT.jar build/publications/mavenJava/maven-metadata.xml; do
            cp $file repo/releases/
          done
          cp build/libs/*.jar repo/releases/ || true
          cp build/libs/*.pom repo/releases/ || true
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <metadata>
            <groupId>org.example</groupId>
            <artifactId>page-lib</artifactId>
            <version>1.0-SNAPSHOT</version>
            <type>pom</type>
          </metadata>' > repo/releases/maven-metadata.xml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/releases

